name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on version tags like v0.1.0, v1.0.0, etc.

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Vulkan SDK (manual - avoid deprecated cache)
        run: |
          $version = "1.3.290.0"
          $url = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
          $installer = "$env:TEMP\VulkanSDK-Installer.exe"

          Write-Host "Downloading Vulkan SDK $version..."
          Invoke-WebRequest -Uri $url -OutFile $installer

          Write-Host "Installing Vulkan SDK..."
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait

          $sdkPath = "C:\VulkanSDK\$version"
          Write-Host "Setting VULKAN_SDK=$sdkPath"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "VK_SDK_PATH=$sdkPath" >> $env:GITHUB_ENV

          Write-Host "Vulkan SDK installed successfully"
        shell: pwsh

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # Temporarily disabled - uses deprecated actions/cache v2
      # - name: Rust cache
      #   uses: swatinem/rust-cache@v2
      #   with:
      #     workspaces: './src-tauri -> target'
      #     key: v0.1.0-thread-safe

      - name: Verify checkout
        run: |
          echo "=== PostCSS Config ==="
          cat postcss.config.js
          echo "=== Package.json devDeps ==="
          cat package.json | grep -A 5 devDependencies
        shell: bash

      - name: Clean all caches
        run: |
          rm -rf node_modules .vite dist
          echo "Cleaned node_modules, .vite, and dist directories"
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Verify installation
        run: |
          echo "=== Installed packages ==="
          npm list tailwindcss autoprefixer postcss
        shell: bash

      - name: Test frontend build
        run: |
          echo "=== Testing frontend build ==="
          npm run build
          echo "=== Frontend build output ==="
          ls -la dist/
        shell: bash

      - name: Test Cargo build
        run: |
          cd src-tauri
          cargo build --release --verbose
        shell: bash
        continue-on-error: true

      - name: Download Whisper model
        run: |
          echo "Downloading Whisper small model (466MB)..."
          mkdir -p models

          # Download with retries and progress display
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            if curl -L --max-time 600 --progress-bar -o models/ggml-small.bin \
              https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin; then
              echo "Download successful!"
              break
            else
              echo "Download failed, retrying..."
              rm -f models/ggml-small.bin
              sleep 5
            fi
          done

          # Verify download
          if [ ! -f models/ggml-small.bin ]; then
            echo "ERROR: Model download failed after 3 attempts"
            exit 1
          fi

          echo "Model downloaded successfully:"
          ls -lh models/
        shell: bash

      - name: Copy resources for bundling
        run: |
          echo "Copying scripts directory into src-tauri for bundling..."
          cp -r scripts src-tauri/scripts
          echo "Scripts copied:"
          ls -la src-tauri/scripts/

          echo "Copying models directory into src-tauri for bundling..."
          cp -r models src-tauri/models
          echo "Models copied:"
          ls -lh src-tauri/models/
        shell: bash

      - name: Build Tauri app
        id: tauri_build
        run: npm run tauri build --verbose 2>&1 | tee build-output.log
        shell: bash
        env:
          RUST_BACKTRACE: "1"

      - name: Show build errors on failure
        if: failure() && steps.tauri_build.outcome == 'failure'
        run: |
          echo "=== BUILD FAILED - ERROR OUTPUT ==="
          cat build-output.log || echo "No build output captured"
        shell: bash

      - name: Upload build error log
        if: failure() && steps.tauri_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build-output.log
          if-no-files-found: warn

      - name: List build outputs (for debugging)
        run: |
          dir src-tauri\target\release\bundle\
          dir src-tauri\target\release\bundle\msi\
        shell: cmd

      - name: Upload MSI installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pilots-desk-windows-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload portable exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pilots-desk-windows-portable
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: pilots-desk-windows-installer
          path: ./release-artifacts

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Pilot's Desk v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Pilot's Desk v${{ steps.get_version.outputs.VERSION }}

            **Voice-responsive sales assistance for BPO agents**

            ### What's Included

            - ✅ Real-time voice transcription (Whisper.cpp)
            - ✅ Script navigation with live coaching
            - ✅ Compliance monitoring and warnings
            - ✅ Interactive widgets (Sky TV package calculator)
            - ✅ Local transcription for privacy (no audio sent to cloud)

            ### Installation (Windows 10/11)

            1. **Download** `Pilots.Desk_${{ steps.get_version.outputs.VERSION }}_x64_en-US.msi` below
            2. **Double-click** to install
            3. **Launch** from Start Menu
            4. **Grant** microphone permission when prompted

            **Zero configuration required** - Whisper model and dependencies bundled.

            ### System Requirements

            - Windows 10/11 (64-bit)
            - 1 GB free disk space
            - Microphone access

            ### For BPO Admins

            - Installer size: ~475 MB (includes Whisper small model)
            - Silent install: `msiexec /i "Pilots.Desk_${{ steps.get_version.outputs.VERSION }}_x64_en-US.msi" /quiet`
            - Network deployment compatible

            ---

            **Backend API**: http://91.98.79.241:8007
            **Dashboard**: http://91.98.79.241:3000

            Built with ❤️ for CoSauce | Sky TV NZ MVP
          files: |
            release-artifacts/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
