name: Build and Release

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: './src-tauri -> target'

    - name: Install frontend dependencies
      run: npm ci

    - name: Build Tauri app
      run: npm run tauri build
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    - name: Get version from tauri.conf.json
      id: version
      shell: pwsh
      run: |
        $config = Get-Content -Raw -Path "src-tauri/tauri.conf.json" | ConvertFrom-Json
        $version = $config.version
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"

    - name: Create installer artifact
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $msiPath = "src-tauri/target/release/bundle/msi/Pilot's Desk_${version}_x64_en-US.msi"

        if (Test-Path $msiPath) {
          New-Item -ItemType Directory -Force -Path "dist-installer"
          Copy-Item $msiPath "dist-installer/PilotsDesk-${version}-installer.msi"

          # Create checksum
          $hash = Get-FileHash "dist-installer/PilotsDesk-${version}-installer.msi" -Algorithm SHA256
          $hash.Hash | Out-File "dist-installer/PilotsDesk-${version}-installer.msi.sha256"

          Write-Host "✅ Installer created: PilotsDesk-${version}-installer.msi"
          Get-ChildItem "dist-installer"
        } else {
          Write-Host "❌ MSI not found at: $msiPath"
          Get-ChildItem "src-tauri/target/release/bundle" -Recurse
          exit 1
        }

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: pilots-desk-installer-v${{ steps.version.outputs.VERSION }}
        path: dist-installer/*
        retention-days: 90

    - name: Create Release
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Pilot's Desk v${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          dist-installer/*.msi
          dist-installer/*.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Comment on PR with artifact
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const version = "${{ steps.version.outputs.VERSION }}";
          const runId = context.runId;
          const message = `### ✅ Build Successful

          **Version:** ${version}
          **Installer:** Download from [workflow artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId})

          The MSI installer has been built and is ready for testing.`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
